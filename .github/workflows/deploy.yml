name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Materialize the .env the build needs. Priority:
      #   1. ENV_FILE_MIMIR secret — full contents of your local .env
      #   2. .env.example committed to the repo — safe placeholder fallback
      # The build step below sets VITE_BASE_PATH from the repo name so
      # assets resolve at https://<user>.github.io/<repo>/.
      - name: Prepare .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE_MIMIR }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf '%s\n' "$ENV_FILE" > .env
          else
            cp .env.example .env
          fi

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
